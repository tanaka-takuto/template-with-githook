name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem and the outcome you want, not only the implementation.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should be added or improved?
      placeholder: Describe the feature in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need, workflow, or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should the feature behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds did you consider?
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits from this, and are there compatibility or migration concerns?
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this one.
          required: true
        - label: I described the problem this feature solves.
          required: true
